services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: bytechat-backend
    ports:
      - "8080:8080"
    env_file:
      - ./Backend/.env
    environment:
      PORT: 8080
      NODE_ENV: production
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: bytechat-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped
